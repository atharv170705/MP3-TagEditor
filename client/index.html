<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Page 1: Upload -->
         <div id="upload-audio-page" class="uploadaudiopage hidden">
            <h2>Upload your MP3 file</h2>

            <label class="audio-drop-zone" for="audio-input">
                <!-- <strong>Drop MP3 here</strong> -->
                <span id="audio-input-text-area">Drop MP3 or click to browse</span>
                <!-- <small>Only .mp3 files supported</small> -->
            </label>
            <button type="button" class="upload-btn" id="upload-audio-btn">Upload File</button>
            <input type="file" id="audio-input" name="audio" accept="audio/mpeg">

            <!-- <button id="upload-audio-btn">Upload File</button> -->
        </div>

        <!-- Page 2: Tag Editor -->
         <form id="tag-editor-form" class="hidden">
            <h2>Edit Tags</h2>

            <label for="album-art" class="field-label">Album Art</label>
            <input
                type="file"
                id="album-art"
                name="cover"
                accept="image/*"
                class="file-input"
            />
            <img id="album-art-preview" class="album-art-preview hidden" />


            <label for="title">Title</label>
            <input type="text" id="title" name="title">

            <label for="artist">Artist</label>
            <input type="text" id="artist" name="artist">

            <label for="albumArtist">Album Artist</label>
            <input type="text" id="albumArtist" name="albumArtist">

            <label for="album">Album</label>
            <input type="text" id="album" name="album">

            <label for="year">Year</label>
            <input type="number" id="year" name="year">

            <label for="track-number">Track Number</label>
            <input type="number" id="track-number" name="track">

            <button type="button" id="save-btn">Save Tags</button>
         </form>
        <!-- page3 -->

        <div id="download-page" class="">
            <h2>Preview</h2>

            <div class="audio-preview-row">
                <span id="song-title-display"></span>
                <a id="download-btn" download>Download MP3</a>
                <button type="button" id="upload-more-btn">Upload More Files</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
